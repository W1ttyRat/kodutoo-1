<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="clock.js" defer></script>
    <link rel="stylesheet" href="clock.css">
    <title>Kell</title>
</head>

<body>
    <main>
        <div id="container">
            <div id="clockContainer">
                <div id="hours">00:</div>
                <div id="minutes">00:</div>
                <div id="seconds">00</div>
                <div id="ampm"></div>
            </div>
            <div id="dateContainer">
                <div id="day">01.</div>
                <div id="month">01.</div>
                <div id="year">2000</div>
            </div>
        </div>
        <div id="button">
            <button type="button" onclick="toggleSettings()"></button>
        </div>
        <div id="settings">
            <div>
                <label for="format">Vali kellavorming:</label>
                <select id="format" name="format">
                    <option value="24">24-tunnine</option>
                    <option value="12">12-tunnine</option>
                </select>
            </div>
            <div>
                <label for="fontSize">Vali fondisuurus:</label>
                <input type="number" id="fontSize" name="fontSize" min="10" max="100" value="25">
            </div>
            <div>
                <label for="fontFamily">Vali fondipere:</label>
                <select id="fontFamily" name="fontFamily">
                    <option value="'Arial', sans-serif">Arial</option>
                    <option value="'Courier New', Courier, monospace">Courier New</option>
                    <option value="'Times New Roman', Times, serif">Times New Roman</option>
                    <option value="'Verdana', sans-serif">Verdana</option>
                </select>
            </div>
            <div>
                <label for="fontColor">Vali fondivärv:</label>
                <input type="color" id="fontColor" name="fontColor" value="#000000">
            </div>
            <div>
                <label for="backgroundImage">Vali taustapilt:</label>
                <input type="file" id="backgroundImage" name="backgroundImage" accept="image/*">
            </div>
            <div>
                <label for="showSeconds">Näita sekundeid:</label>
                <input type="checkbox" id="showSeconds" name="showSeconds" checked>
            </div>
            <div>
                <button type="button" onclick="saveSettings()">Salvesta</button>
                <button type="button" onclick="resetSettings()">Lähtesta</button>
                <button type="button" onclick="fullScreen()">Täisekraan</button>
            </div>
        </div>
    </main>
</body>

</html>
